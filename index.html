<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分享投資洞察</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1510;
      --paper:  #f5f0e8;
      --gold:   #b8962e;
      --gold-lt:#e8d48a;
      --smoke:  #8c8070;
      --line-green: #06C755;
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Noto Serif TC', serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 20px;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(184,150,46,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(184,150,46,0.06) 0%, transparent 55%);
    }

    /* ── header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    h1 {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: .04em;
    }
    .subtitle {
      margin-top: 8px;
      font-size: 13px;
      color: var(--smoke);
      letter-spacing: .05em;
    }

    /* ── divider ── */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 20px auto;
      opacity: .6;
    }

    /* ── preview cards ── */
    .cards-preview {
      display: flex;
      gap: 8px;
      margin-bottom: 36px;
      overflow-x: auto;
      padding-bottom: 4px;
      max-width: 360px;
      width: 100%;
    }
    .cards-preview::-webkit-scrollbar { display: none; }

    .mini-card {
      flex: 0 0 80px;
      height: 100px;
      background: white;
      border: 1px solid rgba(184,150,46,0.25);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      text-align: center;
    }
    .mini-card .icon { font-size: 22px; }
    .mini-card .label {
      font-size: 9px;
      color: var(--smoke);
      line-height: 1.3;
      letter-spacing: .04em;
    }

    /* ── share button ── */
    .btn-share {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      padding: 16px 24px;
      background: var(--line-green);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Noto Serif TC', serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: .06em;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 20px rgba(6,199,85,0.35);
    }
    .btn-share:hover:not(:disabled) { opacity: .88; }
    .btn-share:active:not(:disabled) { transform: scale(.97); }
    .btn-share:disabled {
      background: #ccc;
      box-shadow: none;
      cursor: not-allowed;
    }
    .btn-share svg { flex-shrink: 0; }

    /* ── status area ── */
    .status {
      margin-top: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: .06em;
      text-align: center;
      min-height: 18px;
      color: var(--smoke);
    }
    .status.ok    { color: #2e8b57; }
    .status.err   { color: #c0392b; }
    .status.warn  { color: #b8962e; }

    /* ── debug box (hidden by default) ── */
    #debug {
      display: none;
      margin-top: 24px;
      width: 100%;
      max-width: 360px;
      background: #fff8;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      line-height: 1.7;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .debug-toggle {
      margin-top: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--smoke);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      letter-spacing: .06em;
    }
  </style>
</head>
<body>

  <div class="header">
    <p class="eyebrow">LINE · Flex Message</p>
    <h1>投資洞察<br>卡片分享</h1>
    <p class="subtitle">Hong Kong · Family Office · 實體資產</p>
  </div>

  <div class="divider"></div>

  <div class="cards-preview">
    <div class="mini-card"><div class="icon">✈️</div><div class="label">香港行<br>倒數</div></div>
    <div class="mini-card"><div class="icon">🏛️</div><div class="label">LGT<br>王室家辦</div></div>
    <div class="mini-card"><div class="icon">⚖️</div><div class="label">風險<br>哲學</div></div>
    <div class="mini-card"><div class="icon">🤝</div><div class="label">共同<br>投資</div></div>
    <div class="mini-card"><div class="icon">🏢</div><div class="label">實體<br>資產</div></div>
  </div>

  <button class="btn-share" id="shareBtn" disabled onclick="shareFlex()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" y1="2" x2="12" y2="15"/>
    </svg>
    分享卡片給好友
  </button>

  <p class="status" id="status">初始化中…</p>

  <button class="debug-toggle" onclick="toggleDebug()">顯示診斷資訊</button>
  <pre id="debug"></pre>

<script>
// ──────────────────────────────────────────
//  ★ 只需修改這裡
// ──────────────────────────────────────────
const LIFF_ID = "2009433190-yHg23ZGB";   // ← 填你的 LIFF ID

// ──────────────────────────────────────────
//  Flex Message JSON
// ──────────────────────────────────────────
const flexMessage = {
  type: "flex",
  altText: "投資洞察卡片分享",
  contents: {
    type: "carousel",
    contents: [
      makeBubble("✈️", "香港行倒數", "#1a3a5c", "出發前最後準備，王室辦公室行程確認中", "查看行程"),
      makeBubble("🏛️", "LGT 王室家辦", "#2c4a1e", "Liechtenstein 家族辦公室的資產管理哲學", "了解更多"),
      makeBubble("⚖️", "風險哲學", "#3d2c1e", "不對稱風險回報：下行保護優先於上行追求", "閱讀全文"),
      makeBubble("🤝", "共同投資", "#1e2c3d", "與家辦並肩投資，對齊利益的合作結構", "探索機會"),
      makeBubble("🏢", "實體資產", "#2c1e3d", "香港核心地段商業不動產的長期價值錨定", "查看標的"),
    ]
  }
};

function makeBubble(icon, title, color, body, cta) {
  return {
    type: "bubble",
    body: {
      type: "box",
      layout: "vertical",
      backgroundColor: color,
      paddingAll: "20px",
      contents: [
        { type: "text", text: icon, size: "3xl", margin: "none" },
        { type: "text", text: title, color: "#ffffff", weight: "bold", size: "lg", margin: "md", wrap: true },
        { type: "text", text: body, color: "#cccccc", size: "sm", margin: "sm", wrap: true }
      ]
    },
    footer: {
      type: "box",
      layout: "vertical",
      backgroundColor: color,
      paddingAll: "16px",
      contents: [{
        type: "button",
        style: "primary",
        color: "#b8962e",
        action: { type: "uri", label: cta, uri: "https://line.me" }
      }]
    }
  };
}

// ──────────────────────────────────────────
//  狀態 helpers
// ──────────────────────────────────────────
const statusEl = document.getElementById("status");
const shareBtn = document.getElementById("shareBtn");
const debugEl  = document.getElementById("debug");
const logs = [];

function log(...args) {
  const msg = args.map(a => typeof a === "object" ? JSON.stringify(a) : String(a)).join(" ");
  logs.push(msg);
  debugEl.textContent = logs.join("\n");
}

function setStatus(msg, type = "") {
  statusEl.textContent = msg;
  statusEl.className = "status " + type;
  log("[status]", msg);
}

function toggleDebug() {
  debugEl.style.display = debugEl.style.display === "block" ? "none" : "block";
}

// ──────────────────────────────────────────
//  LIFF 初始化
// ──────────────────────────────────────────
async function initLiff() {
  try {
    log("[init] LIFF ID:", LIFF_ID);
    await liff.init({ liffId: LIFF_ID });
    log("[init] liff.init OK");
    log("[init] isInClient:", liff.isInClient());
    log("[init] isLoggedIn:", liff.isLoggedIn());

    if (!liff.isLoggedIn()) {
      setStatus("請先登入 LINE…", "warn");
      liff.login();
      return;
    }

    const available = liff.isApiAvailable("shareTargetPicker");
    log("[init] shareTargetPicker available:", available);

    if (!available) {
      setStatus("⚠️ 此帳號無法使用 shareTargetPicker", "err");
      shareBtn.title = "需要在 LINE app 內開啟，且 channel 需開啟 shareTargetPicker 功能";
      return;
    }

    setStatus("✓ 準備完成，可以分享", "ok");
    shareBtn.disabled = false;

  } catch (err) {
    log("[init] ERROR:", err.message || err);
    setStatus("初始化失敗：" + (err.message || err), "err");
    debugEl.style.display = "block"; // 自動展開 debug
  }
}

// ──────────────────────────────────────────
//  分享
// ──────────────────────────────────────────
async function shareFlex() {
  try {
    shareBtn.disabled = true;
    setStatus("開啟分享選單…", "");
    log("[share] calling shareTargetPicker…");

    const result = await liff.shareTargetPicker([flexMessage]);

    if (result) {
      log("[share] success, method:", result.status);
      setStatus("✓ 分享成功！", "ok");
    } else {
      log("[share] user cancelled");
      setStatus("已取消分享", "warn");
    }
  } catch (err) {
    log("[share] ERROR:", err.message || err);
    setStatus("分享失敗：" + (err.message || err), "err");
    debugEl.style.display = "block";
  } finally {
    shareBtn.disabled = false;
  }
}

// ──────────────────────────────────────────
//  啟動
// ──────────────────────────────────────────
initLiff();
</script>
</body>
</html>
