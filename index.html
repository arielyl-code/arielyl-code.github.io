    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        document.getElementById("status").textContent = "準備好了，可以分享！";
        document.getElementById("shareBtnLGT").disabled = false;
        document.getElementById("shareBtnNotice").disabled = false;
      } catch (e) {
        document.getElementById("status").textContent = "初始化失敗，請在 LINE 內開啟此頁面";
        document.getElementById("status").className = "status error";
      }
    }

    async function shareMessage(type) {
      const status = document.getElementById("status");
      const btnLGT = document.getElementById("shareBtnLGT");
      const btnNotice = document.getElementById("shareBtnNotice");

      if (!liff.isApiAvailable("shareTargetPicker")) {
        status.textContent = "⚠️ 此環境不支援分享功能，請在 LINE 內開啟";
        status.className = "status error";
        return;
      }

      btnLGT.disabled = true;
      btnNotice.disabled = true;
      status.textContent = "開啟好友選擇器…";
      status.className = "status";

      try {
        const res = await liff.shareTargetPicker([messages[type]], { isMultiple: true });
        if (res) {
          status.textContent = "✅ 分享成功！";
          status.className = "status success";
        } else {
          status.textContent = "已取消分享";
          status.className = "status";
        }
      } catch (e) {
        status.textContent = "❌ 分享失敗：" + e.message;
        status.className = "status error";
      } finally {
        btnLGT.disabled = false;
        btnNotice.disabled = false;
      }
    }

    document.getElementById("shareBtnLGT").disabled = true;
    document.getElementById("shareBtnNotice").disabled = true;
    init();
  </script>
