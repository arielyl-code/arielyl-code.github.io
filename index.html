    async function init() {
      const status = document.getElementById("status");
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        status.textContent = "準備好了，可以分享！";
        document.querySelectorAll(".btn").forEach(b => b.disabled = false);
      } catch (e) {
        status.textContent = "❌ " + (e.message || JSON.stringify(e));
        status.className = "status error";
      }
    }

    async function shareMessage(type) {
      const status = document.getElementById("status");
      document.querySelectorAll(".btn").forEach(b => b.disabled = true);
      status.textContent = "開啟好友選擇器…";
      status.className = "status";

      if (!liff.isApiAvailable("shareTargetPicker")) {
        status.textContent = "⚠️ 請在 LINE 內開啟此頁面";
        status.className = "status error";
        document.querySelectorAll(".btn").forEach(b => b.disabled = false);
        return;
      }

      try {
        const res = await liff.shareTargetPicker([messages[type]], { isMultiple: true });
        if (res) {
          status.textContent = "✅ 分享成功！";
          status.className = "status success";
        } else {
          status.textContent = "已取消分享";
          status.className = "status";
        }
      } catch (e) {
        status.textContent = "❌ " + e.message;
        status.className = "status error";
      } finally {
        document.querySelectorAll(".btn").forEach(b => b.disabled = false);
      }
    }

    document.querySelectorAll(".btn").forEach(b => b.disabled = true);
    init();
  </script>
