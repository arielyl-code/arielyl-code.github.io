":[{"type":"text","text":"以家族資本定義另類投資的進入門檻","wrap":true,"color":"#427594","size":"md","weight":"regular","align":"center"},{"type":"separator","color":"#427594","margin":"lg"},{"type":"text","text":"南豐透過旗下「南豐生科」與「仰和投資」，在生物技術、精準醫療與健康產業建立起全球領先的生態體系。這種將財富投入人類未來命運的戰略定力，使其在另類投資領域具備極高的進入門檻與專業壁壘——透過倫敦、紐約及亞洲核心城市的物業組合與科技布局，南豐以實業家的思維重新定義資本的社會價值，實現家族影響力在產業創新與跨國資產中的永續傳承。","wrap":true,"color":"#000000","size":"md","margin":"lg"}]}]}},{"type":"bubble","size":"mega","hero":{"type":"image","url":"https://image2url.com/r2/default/images/1773825776212-e96a061f-b167-4528-b3c8-79973a4d9ab7.jpg","size":"full","aspectMode":"cover","aspectRatio":"320:213"},"body":{"type":"box","layout":"vertical","spacing":"sm","paddingAll":"13px","contents":[{"type":"box","layout":"vertical","height":"30px","contents":[{"type":"text","weight":"bold","size":"lg","wrap":true,"align":"center","text":"港科大家族辦公室研究中心","contents":[]}]},{"type":"box","layout":"vertical","margin":"sm","contents":[{"type":"text","text":"傳承的知識基礎","wrap":true,"color":"#427594","size":"md","weight":"regular","align":"center"},{"type":"separator","color":"#427594","margin":"lg"},{"type":"text","text":"香港科技大學商學院長期在全球及大中華區商學領域名列前茅。回應高資產族群需求，港科大設立「金樂琦亞洲家族企業與家族辦公室研究中心」，聚焦亞洲與華人家族企業的治理結構、跨代傳承與投資策略，定期發布大中華區家族辦公室趨勢分析，成為亞洲家族資本與家辦專業化最重要的知識平台之一。","wrap":true,"color":"#000000","size":"md","margin":"lg"}]}]},"footer":{"type":"box","layout":"vertical","contents":[{"type":"box","layout":"vertical","backgroundColor":"#427594","cornerRadius":"md","height":"40px","alignItems":"center","justifyContent":"center","action":{"type":"uri","label":"action","uri":"https://afbfo.hkust.edu.hk/zh-hant/frontpage"},"contents":[{"type":"text","text":"延伸閱讀 >","color":"#ffffff"}]}]}},{"type":"bubble","size":"mega","hero":{"type":"image","url":"https://image2url.com/r2/default/images/1773825892588-161ea909-f9fe-43ac-9306-88d27c5c1791.jpg","size":"full","aspectMode":"cover","aspectRatio":"320:213"},"body":{"type":"box","layout":"vertical","spacing":"sm","paddingAll":"13px","contents":[{"type":"box","layout":"vertical","height":"30px","contents":[{"type":"text","weight":"bold","size":"lg","wrap":true,"align":"center","text":"②從學術視角重新盤點位置","contents":[]}]},{"type":"box","layout":"vertical","margin":"sm","contents":[{"type":"text","text":"跨越個案的結構性分析","wrap":true,"color":"#427594","size":"md","weight":"regular","align":"center"},{"type":"separator","color":"#427594","margin":"lg"},{"type":"text","text":"研究中心透過研究報告、論壇與專業課程，促進學界、產業與政策層的深度交流。這種將亞洲華人家族在治理結構、跨代傳承與投資策略上的真實困境，轉化為可被分析、可被應用之系統性知識的能力，提供了個人顧問機構難以複製的視角厚度——在完成前四場高密度的機構對話之後，這是一個從外部重新校準自身位置的關鍵節點。","wrap":true,"color":"#000000","size":"md","margin":"lg"}]}]}},{"type":"bubble","size":"mega","hero":{"type":"image","url":"https://image2url.com/r2/default/images/1773825981614-3527746d-7a65-4874-a2bf-bba77247dc3a.jpg","size":"full","aspectMode":"cover","aspectRatio":"320:213"},"body":{"type":"box","layout":"vertical","spacing":"sm","paddingAll":"13px","contents":[{"type":"box","layout":"vertical","height":"30px","contents":[{"type":"text","weight":"bold","size":"lg","wrap":true,"align":"center","text":"②與亞洲接班世代同框","contents":[]}]},{"type":"box","layout":"vertical","margin":"sm","contents":[{"type":"text","text":"理解下一個十年的思維座標","wrap":true,"color":"#427594","size":"md","weight":"regular","align":"center"},{"type":"separator","color":"#427594","margin":"lg"},{"type":"text","text":"此次交流同時涵蓋香港當地的二代菁英。亞洲接班世代正以截然不同的方式重新定義財富的邊界與意義——理解這一代如何思考家族資本的未來，是任何希望在下一個十年持續保有影響力的家族，不能迴避的戰略功課。","wrap":true,"color":"#000000","size":"md","margin":"lg"}]}]}}]}

    async function init() {
      const status = document.getElementById("status");
      try {
        status.textContent = "初始化中…";
        await liff.init({ liffId: LIFF_ID });
        status.textContent = "驗證登入中…";
        if (!liff.isLoggedIn()) {
          status.textContent = "導向登入中…";
          liff.login();
          return;
        }
        status.textContent = "準備好了，可以分享！";
        document.querySelectorAll(".btn").forEach(b => b.disabled = false);
      } catch (e) {
        status.textContent = "錯誤：" + (e.message || JSON.stringify(e));
        status.className = "status error";
      }
    }

    async function shareMessage(type) {
      const status = document.getElementById("status");
      document.querySelectorAll(".btn").forEach(b => b.disabled = true);
      status.textContent = "開啟好友選擇器…";
      status.className = "status";

      if (!liff.isApiAvailable("shareTargetPicker")) {
        status.textContent = "⚠️ 此環境不支援分享功能，請在 LINE 內開啟";
        status.className = "status error";
        document.querySelectorAll(".btn").forEach(b => b.disabled = false);
        return;
      }

      try {
        const res = await liff.shareTargetPicker([messages[type]], { isMultiple: true });
        if (res) {
          status.textContent = "✅ 分享成功！";
          status.className = "status success";
        } else {
          status.textContent = "已取消分享";
          status.className = "status";
        }
      } catch (e) {
        status.textContent = "❌ 分享失敗：" + e.message;
        status.className = "status error";
      } finally {
        document.querySelectorAll(".btn").forEach(b => b.disabled = false);
      }
    }

    document.querySelectorAll(".btn").forEach(b => b.disabled = true);
    init();
  </script>
</body>
</html>
