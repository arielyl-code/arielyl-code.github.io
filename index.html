<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>香港行｜分享給朋友</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2c5f7a 0%, #427594 50%, #5a9ab5 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; line-height: 1.4; }
    p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 20px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #427594;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
      margin-top: 10px;
    }
    .btn.secondary {
      background: white;
      color: #427594;
      border: 2px solid #427594;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: #ccc; border-color: #ccc; color: #999; cursor: not-allowed; }
    .divider { border: none; border-top: 1px solid #eee; margin: 14px 0; }
    .section-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .status { margin-top: 16px; font-size: 13px; color: #888; min-height: 20px; }
    .status.success { color: #2e7d32; font-weight: 600; }
    .status.error { color: #c62828; font-weight: 600; }
    #btnArea { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📨</div>
    <h1>香港行倒數<br>分享給朋友</h1>
    <p>點下方按鈕，選擇要分享的好友或群組。</p>

    <div id="btnArea"></div>
    <div class="status" id="status">載入中…</div>
  </div>

  <script>
    const LIFF_ID = "2009433190-yHg23ZGB";
    let messages = {};

    async function init() {
      const status = document.getElementById("status");
      try {
        // 同步載入 LIFF 和 data.json
        const [_, dataRes] = await Promise.all([
          liff.init({ liffId: LIFF_ID }),
          fetch("./data.json?v=" + Date.now())
        ]);
        const data = await dataRes.json();
        messages = data.messages;

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // 動態產生按鈕
        const area = document.getElementById("btnArea");
        area.style.display = "block";

        data.buttons.forEach((group, i) => {
          if (group.divider) {
            const hr = document.createElement("hr");
            hr.className = "divider";
            area.appendChild(hr);
            const label = document.createElement("div");
            label.className = "section-label";
            label.textContent = group.label;
            area.appendChild(label);
            return;
          }
          const btn = document.createElement("button");
          btn.className = "btn" + (group.secondary ? " secondary" : "");
          btn.style.marginTop = i === 0 ? "0" : "10px";
          btn.innerHTML = `<span>${group.emoji}</span> ${group.label}`;
          btn.onclick = () => shareMessage(group.id);
          area.appendChild(btn);
        });

        status.textContent = "準備好了，可以分享！";
      } catch (e) {
        status.textContent = "❌ " + (e.message || JSON.stringify(e));
        status.className = "status error";
      }
    }

    async function shareMessage(id) {
      const status = document.getElementById("status");
      const btns = document.querySelectorAll(".btn");
      btns.forEach(b => b.disabled = true);
      status.textContent = "開啟好友選擇器…";
      status.className = "status";

      if (!liff.isApiAvailable("shareTargetPicker")) {
        status.textContent = "⚠️ 請在 LINE 內開啟此頁面";
        status.className = "status error";
        btns.forEach(b => b.disabled = false);
        return;
      }

      try {
        const msg = messages[id];
        const res = await liff.shareTargetPicker([msg], { isMultiple: true });
        if (res) {
          status.textContent = "✅ 分享成功！";
          status.className = "status success";
        } else {
          status.textContent = "已取消分享";
          status.className = "status";
        }
      } catch (e) {
        status.textContent = "❌ " + e.message;
        status.className = "status error";
      } finally {
        btns.forEach(b => b.disabled = false);
      }
    }

    init();
  </script>
</body>
</html>
